name: Controlled Cross-Fork Bot PR Probe
on:
  workflow_dispatch:
    inputs:
      head_branch:
        required: true
        type: string
permissions:
  contents: read
  pull-requests: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Attempt harmless cross-repository PR creation
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
        run: |
          set +e
          response=$(gh api --method POST repos/marcelhacks/anthropic-scan-cache-live-poc-20260720/pulls \
            -f title="Controlled fork GITHUB_TOKEN author probe - do not merge" \
            -f head="cllc3993:${HEAD_BRANCH}" \
            -f base="main" \
            -f body="Controlled test of whether a fork GITHUB_TOKEN can author a cross-repository PR." 2>&1)
          status=$?
          echo "api_exit=${status}"
          echo "$response" | sed -E "s/(token|authorization)[^ ]*/[REDACTED]/Ig"
          exit 0